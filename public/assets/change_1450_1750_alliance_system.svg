<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <style>
      .title { font-family: sans-serif; font-size: 24px; font-weight: bold; fill: #1e293b; text-anchor: middle; }
      .box { rx: 8px; ry: 8px; stroke-width: 2px; transition: all 0.3s ease; }
      .box:hover { filter: drop-shadow(0 0 8px rgba(59, 130, 246, 0.5)); transform: scale(1.02); transform-origin: center; cursor: pointer; }
      .box.alliance:hover { filter: drop-shadow(0 0 8px rgba(239, 68, 68, 0.5)); }
      .entente { fill: #eff6ff; stroke: #3b82f6; }
      .alliance { fill: #fef2f2; stroke: #ef4444; }
      .neutral { fill: #f8fafc; stroke: #94a3b8; }
      .text-entente { font-family: sans-serif; font-size: 16px; font-weight: bold; fill: #1e3a8a; text-anchor: middle; pointer-events: none; }
      .text-alliance { font-family: sans-serif; font-size: 16px; font-weight: bold; fill: #7f1d1d; text-anchor: middle; pointer-events: none; }
      .line { stroke: #64748b; stroke-width: 3px; stroke-dasharray: 6,4; }
      .line-solid { stroke: #64748b; stroke-width: 3px; stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: dash 2s linear forwards; }
      .label { font-family: sans-serif; font-size: 12px; font-weight: bold; fill: #475569; text-anchor: middle; pointer-events: none; }
      
      @keyframes dash {
        to { stroke-dashoffset: 0; }
      }
    </style>
  </defs>

  <text x="400" y="40" class="title">The European Alliance System (1914)</text>

  <!-- TRIPLE ENTENTE (Left Side) -->
  <rect x="50" y="100" width="200" height="350" class="box entente" fill-opacity="0.3" stroke-dasharray="10,5" />
  <text x="150" y="130" class="text-entente" style="font-size: 20px;">Triple Entente</text>

  <rect x="80" y="160" width="140" height="60" class="box entente" />
  <text x="150" y="195" class="text-entente">Great Britain</text>

  <rect x="80" y="270" width="140" height="60" class="box entente" />
  <text x="150" y="305" class="text-entente">France</text>

  <rect x="80" y="380" width="140" height="60" class="box entente" />
  <text x="150" y="415" class="text-entente">Russia</text>

  <!-- TRIPLE ALLIANCE (Right Side) -->
  <rect x="550" y="100" width="200" height="350" class="box alliance" fill-opacity="0.3" stroke-dasharray="10,5" />
  <text x="650" y="130" class="text-alliance" style="font-size: 20px;">Triple Alliance</text>

  <rect x="580" y="160" width="140" height="60" class="box alliance" />
  <text x="650" y="195" class="text-alliance">Germany</text>

  <rect x="580" y="270" width="140" height="60" class="box alliance" />
  <text x="650" y="305" class="text-alliance">Austria-Hungary</text>

  <rect x="580" y="380" width="140" height="60" class="box alliance" />
  <text x="650" y="415" class="text-alliance">Italy</text>

  <!-- CONNECTIONS ENTENTE -->
  <line x1="150" y1="220" x2="150" y2="270" class="line-solid" style="animation-delay: 0.5s;" />
  <text x="110" y="250" class="label">Entente Cordiale</text>
  
  <line x1="150" y1="330" x2="150" y2="380" class="line-solid" style="animation-delay: 1s;" />
  <text x="100" y="360" class="label">Franco-Russian</text>

  <path d="M 80 190 Q 20 290 80 410" class="line-solid" fill="transparent" style="animation-delay: 1.5s;" />
  <text x="35" y="305" class="label" transform="rotate(-90 35,305)">Anglo-Russian</text>

  <!-- CONNECTIONS ALLIANCE -->
  <line x1="650" y1="220" x2="650" y2="270" class="line-solid" style="animation-delay: 0.5s;" />
  <text x="700" y="250" class="label">Dual Alliance</text>

  <line x1="650" y1="330" x2="650" y2="380" class="line-solid" style="animation-delay: 1s;" />
  
  <path d="M 720 190 Q 780 290 720 410" class="line-solid" fill="transparent" style="animation-delay: 1.5s;" />

  <!-- SERBIA & RUSSIA -->
  <rect x="330" y="380" width="140" height="60" class="box neutral" />
  <text x="400" y="415" class="label" style="fill:#0f172a">Serbia</text>

  <line x1="220" y1="410" x2="330" y2="410" class="line" />
  <text x="275" y="405" class="label">Protector</text>

  <!-- TENSION -->
  <line x1="470" y1="410" x2="580" y2="300" class="line" stroke="#ef4444" />
  <text x="525" y="350" class="label" fill="#ef4444">Hostility</text>
  
  <line x1="220" y1="300" x2="580" y2="190" class="line" stroke="#ef4444" />
  <text x="400" y="240" class="label" fill="#ef4444">Rivalry (Alsace-Lorraine)</text>

</svg>
