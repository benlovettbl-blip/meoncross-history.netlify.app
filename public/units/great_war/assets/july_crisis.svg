<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <style>
      .title { font-family: sans-serif; font-size: 24px; font-weight: bold; fill: #1e293b; text-anchor: middle; }
      
      .domino-group {
        opacity: 0;
        animation: fadeSlideDown 0.8s ease forwards;
        transition: all 0.3s ease;
      }
      .domino-group:hover {
        transform: scale(1.03) translateX(5px);
        filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        cursor: pointer;
      }

      .box { rx: 8px; ry: 8px; stroke-width: 2px; }
      .event { fill: #f8fafc; stroke: #3b82f6; stroke-width: 3px; }
      .text-event { font-family: sans-serif; font-size: 14px; font-weight: bold; fill: #0f172a; text-anchor: middle; pointer-events: none; }
      .text-date { font-family: sans-serif; font-size: 12px; fill: #64748b; text-anchor: middle; pointer-events: none; }
      
      .arrow-group {
        opacity: 0;
        animation: fadeIn 0.5s ease forwards;
      }
      .arrow { stroke: #1e293b; stroke-width: 3px; fill: none; marker-end: url(#arrowhead); }

      @keyframes fadeSlideDown {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      .step1 { animation-delay: 0.2s; }
      .arr1  { animation-delay: 1.0s; }
      .step2 { animation-delay: 1.5s; }
      .arr2  { animation-delay: 2.3s; }
      .step3 { animation-delay: 2.8s; }
      .arr3  { animation-delay: 3.6s; }
      .step4 { animation-delay: 4.1s; }
      .arr4  { animation-delay: 4.9s; }
      .step5 { animation-delay: 5.4s; }
      .arr5  { animation-delay: 6.2s; }
      .step6 { animation-delay: 6.7s; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e293b" />
    </marker>
  </defs>

  <text x="400" y="40" class="title">The July Crisis (1914) - The Domino Effect</text>

  <!-- Step 1 -->
  <g class="domino-group step1">
    <rect x="250" y="70" width="300" height="60" class="box event" />
    <text x="400" y="95" class="text-event">Assassination of Franz Ferdinand</text>
    <text x="400" y="115" class="text-date">28 June 1914</text>
  </g>

  <g class="arrow-group arr1">
    <path d="M 400 130 L 400 160" class="arrow" />
  </g>

  <!-- Step 2 -->
  <g class="domino-group step2">
    <rect x="250" y="160" width="300" height="60" class="box event" />
    <text x="400" y="185" class="text-event">Austria-Hungary issues Ultimatum to Serbia</text>
    <text x="400" y="205" class="text-date">23 July 1914</text>
  </g>

  <g class="arrow-group arr2">
    <path d="M 400 220 L 400 250" class="arrow" />
  </g>

  <!-- Step 3 -->
  <g class="domino-group step3">
    <rect x="250" y="250" width="300" height="60" class="box event" />
    <text x="400" y="275" class="text-event">Austria-Hungary declares war on Serbia</text>
    <text x="400" y="295" class="text-date">28 July 1914</text>
  </g>

  <g class="arrow-group arr3">
    <path d="M 400 310 L 400 340" class="arrow" />
  </g>

  <!-- Step 4 -->
  <g class="domino-group step4">
    <rect x="250" y="340" width="300" height="60" class="box event" />
    <text x="400" y="365" class="text-event">Russia mobilizes army to defend Serbia</text>
    <text x="400" y="385" class="text-date">30 July 1914</text>
  </g>

  <g class="arrow-group arr4">
    <path d="M 400 400 L 400 430" class="arrow" />
  </g>

  <!-- Step 5 -->
  <g class="domino-group step5">
    <rect x="250" y="430" width="300" height="60" class="box event" />
    <text x="400" y="455" class="text-event">Germany declares war on Russia &amp; France</text>
    <text x="400" y="475" class="text-date">1-3 August 1914</text>
  </g>

  <g class="arrow-group arr5">
    <path d="M 400 490 L 400 520" class="arrow" />
  </g>

  <!-- Step 6 -->
  <g class="domino-group step6">
    <rect x="250" y="520" width="300" height="60" class="box event" />
    <text x="400" y="545" class="text-event">Britain declares war on Germany</text>
    <text x="400" y="565" class="text-date">4 August 1914</text>
  </g>

</svg>
