<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mr Lovett's History Hub - Unit Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/src/engine/unit_styles.css">
</head>
<body>

  <!-- Screen-Only Navigation Header -->
  <header class="no-print-header" style="background: #ffffff; border-bottom: 1px solid var(--border-color); padding: 1rem 2rem; position: sticky; top: 0; z-index: 99999; box-shadow: var(--shadow-sm); transform: translateZ(0);">
    <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; flex-wrap: wrap; gap: 1rem;">
      <div style="display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap;">
        <div style="display: flex; align-items: center; gap: 0.75rem;">
          <div>
            <h1 id="engine-unit-title" style="margin: 0; font-family: var(--font-title); font-size: 1.4rem; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 0.5rem;">
              Loading Unit...
            </h1>
            <span id="engine-unit-enquiry" style="font-size: 0.78rem; font-weight: 600; color: var(--text-muted); display: block; margin-top: 2px; font-family: var(--font-title);">
              Please wait...
            </span>
          </div>
          <span id="engine-unit-badge" class="badge badge-primary" style="font-size: 0.75rem; padding: 0.25rem 0.5rem; align-self: flex-start; margin-top: 2px; display: none;"></span>
        </div>
      </div>
      
      <!-- XP Level Progress Widget -->
      <div style="display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap;">
        <div style="display: flex; align-items: center; gap: 0.5rem; font-family: var(--font-title); font-size: 0.9rem; font-weight: 700;">
          <span style="color: var(--text-muted);">Rank:</span>
          <span id="xpBadge" style="color: var(--primary);">Peasant</span>
          <span id="xpText" style="background: rgba(99, 102, 241, 0.1); color: var(--primary); padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.8rem;">0 XP</span>
        </div>
        
        <div style="display: flex; gap: 0.5rem;">
          <button id="engine-theme-toggle" class="btn" style="padding: 0.5rem 0.75rem; border-radius: var(--radius-sm); border: 1px solid var(--border-color); background: var(--bg-surface); cursor: pointer;">
            🎨 Theme
          </button>
        </div>
      </div>
    </div>
  </header>

  <nav class="no-print-header tb-nav" style="background: #f8fafc; border-bottom: 1px solid var(--border-color); padding: 0 2rem; position: sticky; top: 73px; z-index: 99998; transform: translateZ(0);">
    <div id="engine-tabs-container" style="display: flex; gap: 1.5rem; max-width: 1200px; margin: 0 auto; flex-wrap: wrap; align-items: center;">
      <a href="/" style="display: inline-flex; align-items: center; justify-content: center; gap: 0.35rem; text-decoration: none; font-size: 0.82rem; font-family: var(--font-title); font-weight: 700; color: var(--text-main); padding: 0.4rem 0.8rem; border-radius: var(--radius-sm); border: 1px dashed var(--border-color); background: rgba(79, 70, 229, 0.05); margin-right: 10px;">
        <i class="fa-solid fa-arrow-left"></i> Portal
      </a>
      <!-- Dynamic Tabs Injected Here -->
    </div>
  </nav>

  <div class="workbook-container" id="engine-workbook-container" style="position: relative; z-index: 1;">
    <!-- Dynamic Pages Injected Here -->
    <div style="padding: 5rem; text-align: center; color: var(--text-muted);">
      <i class="fa-solid fa-spinner fa-spin fa-2x"></i>
      <p style="margin-top: 1rem;">Loading historical records...</p>
    </div>
  </div>

  <script type="module" src="/src/engine/AppEngine.js"></script>
</body>
</html>
