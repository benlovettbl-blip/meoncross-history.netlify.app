<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Conflict in the Middle East</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="style.css">
  

  

  

  
  
  <script class="ux-tweaks-script">
    window.addEventListener('scroll', () => {
      const btn = document.getElementById('back-to-top');
      if (btn) {
        if (window.scrollY > 500) {
          btn.classList.add('visible');
        } else {
          btn.classList.remove('visible');
        }
      }
    });
    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>

    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      mermaid.initialize({ startOnLoad: false, theme: 'default' });
    });
  </script>

  <!-- Touchscreen Drag and Drop Polyfill -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0/default.css">
  <script src="https://cdn.jsdelivr.net/npm/mobile-drag-drop@2.3.0/index.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      MobileDragDrop.polyfill({
        dragImageTranslateOverride: MobileDragDrop.scrollBehaviourDragImageTranslateOverride
      });
      // Workaround for touch scrolling issues
      window.addEventListener('touchmove', function() {}, {passive: false});
    });
  </script>

</head>
<body>
  <div class="app-container" style="display: flex; height: 100vh; overflow: hidden; width: 100vw;">
    <aside class="sidebar" id="sidebar" style="width: 280px; background: white; border-right: 1px solid var(--border-glass); display: flex; flex-direction: column; flex-shrink: 0; z-index: 100;">
      <div class="sidebar-logo" style="padding: 1.5rem 1rem; border-bottom: 1px solid var(--border-glass); cursor: pointer; margin-bottom: 0;" onclick="window.location.href='/'" title="Back to History Hub">
        <i class="fa-solid fa-graduation-cap logo-icon"></i>
        <div>
          <h2 style="margin: 0;">Mr Lovett's History Hub</h2>
          <span>History Portal</span>
        </div>
      </div>
      <div id="sidebar-nav-container" style="flex-grow: 1; overflow-y: auto; padding: 1.5rem 1rem;">
        <!-- Lesson links injected here -->
      </div>
    </aside>

    <main class="main-wrapper" style="flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #f8f9fa;">
      <header class="main-header" style="background: #1a237e; color: white; border-bottom: 1px solid var(--border-glass); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; z-index: 10; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <div class="header-title-container" style="display: flex; align-items: center; gap: 1rem;">
          
          <h1 style="margin: 0; font-size: 1.5rem; font-weight: 600;">Conflict in the Middle East, 1945–1995</h1>
        </div>
        <div class="header-actions" style="display: flex; gap: 10px; align-items: center;">
          <button id="btn-fullscreen" class="btn btn-secondary" style="margin-right: 5px; padding: 6px 12px;" onclick="if (!document.fullscreenElement) { const el = document.querySelector('.main-wrapper') || document.documentElement; el.requestFullscreen(); } else { document.exitFullscreen(); }" title="Full Screen"><i class="fa-solid fa-expand"></i></button>
          
          <button id="btn-text-size" class="btn btn-secondary" style="margin-right: 5px; padding: 6px 12px;" onclick="document.body.classList.toggle('large-text')" title="A+ / A-"><i class="fa-solid fa-text-height"></i></button>
          <button id="btn-dyslexia" class="btn btn-secondary" style="padding: 6px 12px;" title="SEN / Dyslexia Mode"><i class="fa-solid fa-glasses"></i></button>
        </div>
      </header>

      <div class="content-area" id="content-area" style="flex: 1; overflow-y: auto; padding: 2rem 4rem;">
        <!-- Narrative and tasks injected here -->
      </div>
    </main>
  </div>

  <script type="module" src="./app.js"></script>

  <!-- Interactive Milestone Modal (Screen Only) -->
  <div id="milestoneModal" class="modal-overlay no-print" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 1000;" onclick="if(event.target === this) closeMilestoneModal()">
    <div class="modal-content" style="background: var(--navy); border: 2.5px solid var(--gold); border-radius: 12px; padding: 25px; max-width: 500px; width: 90%; color: #ffffff; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
      <button class="modal-close-btn" onclick="closeMilestoneModal()" style="position: absolute; top: 15px; right: 15px; background: transparent; border: none; color: #ffffff; font-size: 16pt; cursor: pointer; transition: color 0.2s;"><i class="fa-solid fa-xmark"></i></button>
      <div id="modalMilestoneContent">
        <!-- Content dynamically populated via showMilestoneModal -->
      </div>
    </div>
  </div>

  <!-- Pages display dynamically using tabs in app.js -->

  
<button id="back-to-top" onclick="scrollToTop()" title="Back to Top"><i class="fa-solid fa-arrow-up"></i></button>


  
  <div id="task-whiteboard-modal">
    <div class="whiteboard-content">
      <div class="whiteboard-header">
        <h2 style="margin:0; font-size: 2rem; color: #1e293b;"><i class="fa-solid fa-person-chalkboard"></i> Task Whiteboard</h2>
        <div>
          <button id="toggle-all-wb" class="btn btn-secondary" onclick="window.toggleAllWhiteboardAnswers()" style="font-size: 1rem; padding: 8px 16px; margin-right: 15px;">
            <i class="fa-solid fa-eye"></i> Reveal All Answers
          </button>
          <button class="btn btn-primary" onclick="document.getElementById('task-whiteboard-modal').classList.remove('visible')" style="font-size: 1rem; padding: 8px 16px;">
            <i class="fa-solid fa-xmark"></i> Close Whiteboard
          </button>
        </div>
      </div>
      <div id="whiteboard-questions-container"></div>
    </div>
  </div>
</body>
</html>
