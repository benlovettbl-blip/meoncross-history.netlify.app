<!DOCTYPE html>
<html>
<head>
<style>
      .person-card {
        perspective: 1000px;
        background: transparent;
        cursor: pointer;
        width: 300px;
      }
      .card-inner {
        position: relative;
        transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
        transform-style: preserve-3d;
        -webkit-transform-style: preserve-3d;
      }
      .person-card.flipped .card-inner {
        transform: rotateY(180deg);
        -webkit-transform: rotateY(180deg);
      }
      .card-front, .card-back {
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        border: 1px solid red;
        border-radius: 12px;
        background: white;
      }
      .card-front {
        position: relative;
        z-index: 2;
        padding: 20px;
        transform: rotateY(0deg); /* Some browsers need this */
        -webkit-transform: rotateY(0deg);
      }
      .card-back {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        transform: rotateY(180deg);
        -webkit-transform: rotateY(180deg);
        padding: 20px;
        overflow-y: auto;
        box-sizing: border-box;
      }
</style>
</head>
<body>
  <div class="person-card" onclick="this.classList.toggle('flipped')">
    <div class="card-inner">
      <div class="card-front">Front<br><br>Tall front content</div>
      <div class="card-back">Back</div>
    </div>
  </div>
</body>
</html>
